<style>
/* ===== IL TUO STILE ESISTENTE - INVARIATO ===== */
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

/* ===== THEME VARIABLES ===== */
:root, [data-theme="sand"] {
  --bg-grad: linear-gradient(135deg, #f5f0e6 0%, #ebe3d3 100%);
  --text: #4a4032;
  --header-bg: rgba(250,246,238,0.85);
  --header-border: rgba(168,152,122,0.3);
  --header-shadow: rgba(120,100,70,0.08);
  --accent: #8a9a7b; --accent2: #6f8265;
  --accent-soft: rgba(138,154,123,0.15);
  --accent-soft2: rgba(138,154,123,0.2);
  --accent-glow: rgba(111,130,101,0.3);
  --accent-glow2: rgba(111,130,101,0.4);
  --on-accent: #fdfbf6;
  --outline-bg: rgba(168,152,122,0.08);
  --outline-text: #5c5343;
  --outline-border: rgba(168,152,122,0.4);
  --info: #b89b6e; --info2: #a3855a;
  --danger: #b56548; --danger-line: #c1745c;
  --danger-bg: rgba(193,116,92,0.12); --danger-border: rgba(193,116,92,0.35);
  --sep: rgba(168,152,122,0.35);
  --zoom-bg: rgba(168,152,122,0.12); --zoom-border: rgba(168,152,122,0.25);
  --zoom-btn-bg: rgba(255,255,255,0.6);
  --surface: rgba(250,246,238,0.7);
  --surface-border: rgba(168,152,122,0.25);
  --title-muted: #8a7d63;
  --input-bg: rgba(255,255,255,0.7); --input-border: rgba(168,152,122,0.35);
  --input-text: #4a4032; --placeholder: #a8987a;
  --scroll-track: rgba(168,152,122,0.1);
  --item-bg: rgba(255,255,255,0.45);
  --item-hover: rgba(138,154,123,0.12); --item-hover-border: rgba(138,154,123,0.35);
  --viewer-grad: radial-gradient(ellipse at 50% 30%, #ede5d5 0%, #ddd1bb 100%);
  --canvas-shadow: rgba(120,100,70,0.25); --canvas-ring: rgba(168,152,122,0.3);
  --canvas-shadow-h: rgba(120,100,70,0.32); --canvas-ring-h: rgba(138,154,123,0.5);
  --popup-bg: rgba(250,246,238,0.98); --popup-border: rgba(168,152,122,0.45);
  --popup-shadow: rgba(120,100,70,0.3);
  --overlay-bg: rgba(245,240,230,0.95);
  --toast-bg: rgba(250,246,238,0.96); --toast-border: rgba(168,152,122,0.35);
  --toast-shadow: rgba(120,100,70,0.18);
}

[data-theme="dark"] {
  --bg-grad: linear-gradient(135deg, #0b0c15 0%, #111220 100%);
  --text: #bcc0e0;
  --header-bg: rgba(11,12,21,0.85);
  --header-border: rgba(91,110,245,0.2);
  --header-shadow: rgba(0,0,0,0.4);
  --accent: #5b6ef5; --accent2: #7c3aed;
  --accent-soft: rgba(91,110,245,0.12);
  --accent-soft2: rgba(91,110,245,0.22);
  --accent-glow: rgba(91,110,245,0.3);
  --accent-glow2: rgba(91,110,245,0.45);
  --on-accent: #ffffff;
  --outline-bg: rgba(255,255,255,0.05);
  --outline-text: #d4d0f0;
  --outline-border: rgba(110,95,210,0.35);
  --info: #06b6d4; --info2: #0891b2;
  --danger: #f87171; --danger-line: #ef4444;
  --danger-bg: rgba(239,68,68,0.15); --danger-border: rgba(239,68,68,0.35);
  --sep: rgba(110,95,210,0.3);
  --zoom-bg: rgba(0,0,0,0.3); --zoom-border: rgba(110,95,210,0.25);
  --zoom-btn-bg: rgba(255,255,255,0.08);
  --surface: rgba(18,16,35,0.7);
  --surface-border: rgba(110,95,210,0.22);
  --title-muted: #a78bfa;
  --input-bg: rgba(0,0,0,0.3); --input-border: rgba(110,95,210,0.35);
  --input-text: #e0ddf5; --placeholder: #6b6b8f;
  --scroll-track: rgba(255,255,255,0.05);
  --item-bg: rgba(255,255,255,0.02);
  --item-hover: rgba(91,110,245,0.12); --item-hover-border: rgba(91,110,245,0.35);
  --viewer-grad: radial-gradient(ellipse at 50% 30%, #120e24 0%, #0a0818 100%);
  --canvas-shadow: rgba(0,0,0,0.5); --canvas-ring: rgba(91,110,245,0.25);
  --canvas-shadow-h: rgba(0,0,0,0.6); --canvas-ring-h: rgba(91,110,245,0.45);
  --popup-bg: rgba(24,21,44,0.98); --popup-border: rgba(91,110,245,0.4);
  --popup-shadow: rgba(0,0,0,0.5);
  --overlay-bg: rgba(10,8,24,0.95);
  --toast-bg: rgba(24,21,44,0.95); --toast-border: rgba(91,110,245,0.3);
  --toast-shadow: rgba(0,0,0,0.3);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg-grad);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--header-border);
  padding: 16px 28px;
  min-height: 84px;
  height: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 16px;
  box-shadow: 0 4px 24px var(--header-shadow);
}
.logo {
  font-size: 1.3em;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: -0.3px;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2em;
  box-shadow: 0 4px 14px var(--accent-glow);
}

.toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

/* Per schermi piccoli */
@media (max-width: 768px) {
  .header {
    padding: 16px 12px;
  }
  
  .toolbar {
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  
  .toolbar .btn {
    padding: 8px 12px;
    font-size: 0.7rem;
    min-height: 36px;
  }
}

.btn {
  padding: 11px 20px;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  font-weight: 500;
  font-size: 0.88rem;
  transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  font-family: 'Inter', sans-serif;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--on-accent);
  box-shadow: 0 2px 8px var(--accent-glow);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--accent-glow2);
}

.btn-outline {
  background: var(--outline-bg);
  color: var(--outline-text);
  border: 1px solid var(--outline-border);
}

.btn-outline:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent2);
  transform: translateY(-1px);
}

.btn-success {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--on-accent);
  box-shadow: 0 2px 8px var(--accent-glow);
}

.btn-success:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--accent-glow2);
}

.btn-danger {
  background: var(--danger-bg);
  color: var(--danger);
  border: 1px solid var(--danger-border);
}

.btn-danger:hover {
  background: var(--danger-bg);
  filter: brightness(1.08);
  border-color: var(--danger-line);
}

.btn-info {
  background: linear-gradient(135deg, var(--info), var(--info2));
  color: var(--on-accent);
}

.btn-sm {
  padding: 9px 15px;
  font-size: 0.82rem;
}

.sep {
  width: 1px;
  height: 24px;
  background: var(--sep);
  margin: 0 4px;
}

/* ZOOM GROUP */
.zoom-grp {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--zoom-bg);
  border-radius: 40px;
  padding: 5px 9px;
  border: 1px solid var(--zoom-border);
}

.zoom-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--zoom-btn-bg);
  color: var(--outline-text);
  cursor: pointer;
  font-size: 1.1em;
  transition: all 0.15s;
}

.zoom-btn:hover {
  background: var(--accent);
  color: var(--on-accent);
}

.zoom-lbl {
  font-size: 0.75rem;
  font-weight: 600;
  min-width: 45px;
  text-align: center;
  color: var(--accent2);
}

/* WORKSPACE */
.workspace {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 270px;
  background: var(--surface);
  backdrop-filter: blur(12px);
  border-right: 1px solid var(--surface-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-head {
  padding: 16px;
  border-bottom: 1px solid var(--surface-border);
}

.sidebar-head-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.sidebar-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--title-muted);
  font-weight: 600;
}

.word-stats {
  font-size: 0.7rem;
  background: var(--accent-soft);
  padding: 4px 10px;
  border-radius: 20px;
  color: var(--accent2);
  font-weight: 500;
}

.search-box {
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 10px 12px 10px 36px;
  border-radius: 12px;
  border: 1px solid var(--input-border);
  font-size: 0.8rem;
  background: var(--input-bg);
  color: var(--input-text);
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}

.search-box input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--input-bg);
}

.search-box input::placeholder {
  color: var(--placeholder);
}

.search-box .search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.9rem;
  opacity: 0.5;
}

/* WORD LIST */
.word-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.word-list::-webkit-scrollbar {
  width: 4px;
}

.word-list::-webkit-scrollbar-track {
  background: var(--scroll-track);
  border-radius: 4px;
}

.word-list::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 4px;
}

.word-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 500;
  border: 1px solid transparent;
  transition: all 0.15s;
  margin-bottom: 4px;
  background: var(--item-bg);
  -webkit-tap-highlight-color: transparent;
}

.word-item:hover {
  background: var(--item-hover);
  border-color: var(--item-hover-border);
}

.word-item.selected {
  background: var(--accent-soft2);
  border-color: var(--accent);
  color: var(--accent2);
}

.word-item.modified {
  border-left: 3px solid var(--accent);
}

.word-item.deleted {
  opacity: 0.4;
  text-decoration: line-through;
}

.word-item-badge {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 20px;
}

.badge-mod {
  background: var(--accent-soft2);
  color: var(--accent2);
}

/* VIEWER */
.viewer {
  flex: 1;
  overflow: auto;
  background: var(--viewer-grad);
  padding: 32px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

.canvas-wrap {
  position: relative;
  box-shadow: 0 25px 50px -12px var(--canvas-shadow), 0 0 0 1px var(--canvas-ring);
  border-radius: 16px;
  overflow: hidden;
  background: #fff;
  transition: box-shadow 0.3s;
}

.canvas-wrap:hover {
  box-shadow: 0 30px 60px -12px var(--canvas-shadow-h), 0 0 0 1px var(--canvas-ring-h);
}
/* FIX MOBILE SCROLL - Android/Firefox/DuckDuckGo */
canvas,
.canvas-wrap,
.viewer {
  touch-action: pan-y pinch-zoom !important;
}

#mainCanvas {
  display: block;
  cursor: pointer;
  touch-action: none;
}

/* POPUP */
.editor-popup {
  position: fixed;
  z-index: 9999;
  background: var(--popup-bg);
  backdrop-filter: blur(16px);
  border: 1px solid var(--popup-border);
  border-radius: 20px;
  box-shadow: 0 25px 50px -12px var(--popup-shadow);
  display: none;
  width: 360px;
  max-width: 90vw;
  right: 20px;
  bottom: 20px;
  overflow: hidden;
}

.popup-header {
  padding: 14px 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: move;
  user-select: none;
}

.popup-header span {
  color: var(--on-accent);
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: -0.2px;
}

.popup-close {
  background: rgba(255, 255, 255, 0.2);
  border: none;
  cursor: pointer;
  color: var(--on-accent);
  width: 28px;
  height: 28px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-size: 1.1rem;
}

.popup-close:hover {
  background: var(--danger-line);
}

.popup-body {
  padding: 16px;
}

.popup-body input[type="text"] {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--input-border);
  font-size: 0.85rem;
  margin-bottom: 12px;
  background: var(--input-bg);
  color: var(--input-text);
  font-family: 'Inter', sans-serif;
}

.popup-body input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}

.ctrl-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.ctrl-row label {
  font-size: 0.65rem;
  color: var(--title-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.ctrl-row select,
.ctrl-row input[type="number"] {
  padding: 6px 10px;
  border-radius: 10px;
  border: 1px solid var(--input-border);
  font-size: 0.8rem;
  font-family: 'Inter', sans-serif;
  background: var(--input-bg);
  color: var(--input-text);
}

.ctrl-row input[type="color"] {
  width: 32px;
  height: 28px;
  border-radius: 8px;
  border: 1px solid var(--input-border);
  cursor: pointer;
  background: var(--input-bg);
}

.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

.btn-row button {
  flex: 1;
  justify-content: center;
}

/* LOADING OVERLAY */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  gap: 16px;
}

.loading-overlay.hidden {
  display: none;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--accent-soft);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--title-muted);
}

/* TOAST */
.toast-wrap {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100000;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.toast {
  background: var(--toast-bg);
  backdrop-filter: blur(12px);
  color: var(--text);
  padding: 10px 22px;
  border-radius: 40px;
  font-weight: 500;
  font-size: 0.8rem;
  animation: toastIn 0.25s ease;
  box-shadow: 0 8px 20px var(--toast-shadow);
  border: 1px solid var(--toast-border);
  white-space: nowrap;
}

.toast.success {
  background: var(--accent);
  border-color: var(--accent2);
  color: var(--on-accent);
}

.toast.error {
  background: var(--danger);
  border-color: var(--danger-line);
  color: var(--on-accent);
}

.toast.info {
  background: var(--info);
  border-color: var(--info2);
  color: var(--on-accent);
}

@keyframes toastIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* PAGE INFO */
.page-info {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--title-muted);
  min-width: 55px;
  text-align: center;
}

.theme-toggle {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1px solid var(--outline-border);
  background: var(--outline-bg);
  color: var(--outline-text);
  cursor: pointer;
  font-size: 1.05rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.theme-toggle:hover {
  border-color: var(--accent);
  color: var(--accent2);
  transform: translateY(-1px);
}

/* EXPORT MODAL - NUOVO */
.export-modal {
  position: fixed;
  z-index: 10000;
  background: var(--popup-bg);
  backdrop-filter: blur(16px);
  border: 1px solid var(--popup-border);
  border-radius: 20px;
  width: 320px;
  max-width: 90vw;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  overflow: hidden;
  box-shadow: 0 25px 50px -12px var(--popup-shadow);
}

.export-modal .modal-body {
  padding: 20px;
}

.export-modal h3 {
  margin-bottom: 16px;
  font-size: 1rem;
}

.export-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.export-option {
  padding: 12px;
  border: 1px solid var(--input-border);
  border-radius: 12px;
  cursor: pointer;
  background: var(--input-bg);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.export-option:hover {
  border-color: var(--accent);
  background: var(--accent-soft);
}

/* RESPONSIVE MOBILE & TABLET */
@media (max-width: 768px) {
  .header {
    flex-direction: column;
    height: auto;
    padding: 12px;
    gap: 12px;
  }
  
  .toolbar {
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  
  .toolbar .btn {
    padding: 8px 12px;
    font-size: 0.7rem;
    min-height: 44px;
  }
  
  .zoom-btn {
    width: 36px;
    height: 36px;
  }
  
  .workspace {
    flex-direction: column;
  }
  
  .sidebar {
    width: 100%;
    max-height: 40vh;
    order: 2;
    border-right: none;
    border-top: 1px solid var(--surface-border);
  }
  
  .viewer {
    padding: 16px;
    order: 1;
  }
  
  .canvas-wrap {
    max-width: 100%;
    overflow-x: auto;
  }
  
  .word-item {
    min-height: 44px;
    padding: 10px 12px;
  }
  
  .editor-popup {
    width: 95vw;
    left: 2.5vw;
    right: 2.5vw;
    bottom: 10px;
    top: auto;
  }
  
  .ctrl-row {
    flex-wrap: wrap;
  }
  
  .btn-row {
    flex-direction: column;
  }
  
  .btn-row button {
    width: 100%;
  }

<script>

async function saveBlobNative(blob, suggestedName, ext) {
  const path = await window.__TAURI__.dialog.save({
    defaultPath: suggestedName,
    filters: [{ name: ext.toUpperCase(), extensions: [ext] }]
  });
  if (path == null) return false;
  const bytes = new Uint8Array(await blob.arrayBuffer());
  await window.__TAURI__.fs.writeFile(path, bytes);
  return true;
}

async function savePdf(pdf, suggestedName) {
  if (window.__TAURI__) {
    try {
      const ok = await saveBlobNative(pdf.output('blob'), suggestedName, 'pdf');
      if (ok) toast('PDF saved', 'success');
    } catch (e) {
      toast('Save failed: ' + e, 'error');
    }
  } else {
    pdf.save(suggestedName);
  }
}

if (window.__TAURI__) {
  const origClick = HTMLInputElement.prototype.click;
  HTMLInputElement.prototype.click = function() {
    if (this.type === 'file') {
      const inp = this;
      (async () => {
        const paths = await window.__TAURI__.dialog.open({
          multiple: inp.multiple,
          filters: [{ name: 'Documents', extensions: ['pdf','png','jpg','jpeg','webp','tif','tiff','bmp'] }]
        });
        if (paths == null) return;
        const list = Array.isArray(paths) ? paths : [paths];
        const dt = new DataTransfer();
        for (const p of list) {
          const bytes = await window.__TAURI__.fs.readFile(p);
          const name = p.split('/').pop();
          const e = name.split('.').pop().toLowerCase();
          const mime = e === 'pdf' ? 'application/pdf' : 'image/' + (e === 'jpg' ? 'jpeg' : e);
          dt.items.add(new File([bytes], name, { type: mime }));
        }
        inp.files = dt.files;
        inp.dispatchEvent(new Event('change', { bubbles: true }));
      })();
    } else {
      return origClick.call(this);
    }
  };
}

// STATE
const S = {
  images: [], modified: [], page: 1, total: 0,
  words: [], selId: null, zoom: 1, bw: 0, bh: 0,
  loaded: false, undoStack: [], redoStack: [], filter: ''
};
let selectedWordsSet = new Set();


// FABRIC
const fc = new fabric.Canvas('mainCanvas', { selection: false, allowTouchScrolling: true });
const canvasEl = document.getElementById('mainCanvas');
const popup = document.getElementById('editorPopup');

// ABILITA TASTIERA PER SELEZIONE MULTIPLA

canvasEl.addEventListener('keydown', (e) => {
  // Permette ai tasti modificatori (Cmd, Ctrl, Shift) di funzionare
  if (e.ctrlKey || e.metaKey || e.shiftKey || e.altKey) {
    e.stopPropagation();
  }
});

// POPUP DRAG
let dragActive = false, dragX = 0, dragY = 0;
const popupHeader = document.getElementById('popupHeader');
if (popupHeader) {
  popupHeader.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    dragActive = true;
    const rect = popup.getBoundingClientRect();
    dragX = e.clientX - rect.left;
    dragY = e.clientY - rect.top;
    popup.style.left = rect.left + 'px';
    popup.style.top = rect.top + 'px';
    popup.style.right = 'auto';
    popup.style.bottom = 'auto';
  });
}
document.addEventListener('mousemove', (e) => {
  if (!dragActive) return;
  let left = e.clientX - dragX;
  let top = e.clientY - dragY;
  left = Math.min(Math.max(0, left), window.innerWidth - popup.offsetWidth);
  top = Math.min(Math.max(0, top), window.innerHeight - popup.offsetHeight);
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
});
document.addEventListener('mouseup', () => { dragActive = false; });

// Funzioni utility
function toast(msg, type = '') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;

function loading(show) {

function loadImg(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'Anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

    toast("Redirecting to checkout...", "info");

// ==================== FIX PER MOBILE ====================
const isMobileDevice = () => {
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|mobile/i.test(navigator.userAgent);
};

const FREE_LOAD_LIMIT = 3;

}

  return parseInt(localStorage.getItem("se_free_loads") || "0", 10);
}

async function inpaintClean(words) {
  const idx = S.page - 1;
  const srcUrl = S.modified[idx] || S.images[idx];
  const img = await loadImg(srcUrl);
  const off = document.createElement('canvas');
  off.width = img.width;
  off.height = img.height;
  const ctx = off.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(img, 0, 0);

  for (const w of words) {
    const b = w.newBbox || w.bbox_norm;
    const pad = 4;

    // Clamping corretto: bordo destro/inferiore calcolati dal rettangolo reale
    const bx = Math.max(0, Math.floor(b.x - pad));
    const by = Math.max(0, Math.floor(b.y - pad));
    const bx2 = Math.min(off.width, Math.ceil(b.x + b.width + pad));
    const by2 = Math.min(off.height, Math.ceil(b.y + b.height + pad));
    const bw = bx2 - bx;
    const bh = by2 - by;
    if (bw <= 0 || bh <= 0) continue;

    // Patch estesa di 1px per avere i pixel di bordo
    const ex = Math.max(0, bx - 1);
    const ey = Math.max(0, by - 1);
    const ew = Math.min(off.width - ex, bw + 2);
    const eh = Math.min(off.height - ey, bh + 2);
    const patch = ctx.getImageData(ex, ey, ew, eh);
    const d = patch.data;

    // Offset del box dentro la patch
    const ox = bx - ex;
    const oy = by - ey;

    const px = (x, y) => (y * ew + x) * 4;
    const luma = i => 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];

    // Stima dello sfondo: mediana della luminosità dei pixel di bordo
    const borderIdx = [];
    for (let y = -1; y <= bh; y++) {
      borderIdx.push(px(Math.max(0, ox - 1), Math.min(eh - 1, Math.max(0, oy + y))));
      borderIdx.push(px(Math.min(ew - 1, ox + bw), Math.min(eh - 1, Math.max(0, oy + y))));
    }
    for (let x = 0; x < bw; x++) {
      borderIdx.push(px(ox + x, Math.max(0, oy - 1)));
      borderIdx.push(px(ox + x, Math.min(eh - 1, oy + bh)));
    }
    const lumas = borderIdx.map(luma).sort((a, b2) => a - b2);
    const bgLuma = lumas[Math.floor(lumas.length / 2)];
    const THRESH = 35; // pixel di bordo oltre questa distanza dallo sfondo = testo, scartato

    // Colore di fallback: media dei soli pixel di bordo validi
    let fr = 0, fg = 0, fb = 0, fn = 0;
    for (const i of borderIdx) {
      if (Math.abs(luma(i) - bgLuma) < THRESH) {
        fr += d[i]; fg += d[i + 1]; fb += d[i + 2]; fn++;
      }
    }
    fr /= fn || 1; fg /= fn || 1; fb /= fn || 1;

    const valid = i => Math.abs(luma(i) - bgLuma) < THRESH;

    for (let y = 0; y < bh; y++) {
      const ry = oy + y;
      const li = px(Math.max(0, ox - 1), ry);
      const ri = px(Math.min(ew - 1, ox + bw), ry);
      const lv = valid(li), rv = valid(ri);

      for (let x = 0; x < bw; x++) {
        const rx = ox + x;
        const ti = px(rx, Math.max(0, oy - 1));
        const bi = px(rx, Math.min(eh - 1, oy + bh));
        const tv = valid(ti), bv = valid(bi);

        const t = bw > 1 ? x / (bw - 1) : 0.5;
        const s = bh > 1 ? y / (bh - 1) : 0.5;

        // Pesi direzionali, azzerati se il campione è testo
        const wl = lv ? (1 - t) : 0;
        const wr = rv ? t       : 0;
        const wt = tv ? (1 - s) : 0;
        const wb = bv ? s       : 0;
        const wsum = wl + wr + wt + wb;

        const i = px(rx, ry);
        const n = (Math.random() - 0.5) * 4;

        if (wsum === 0) {
          d[i]     = fr + n;
          d[i + 1] = fg + n;
          d[i + 2] = fb + n;
        } else {
          d[i]     = (d[li] * wl + d[ri] * wr + d[ti] * wt + d[bi] * wb) / wsum + n;
          d[i + 1] = (d[li + 1] * wl + d[ri + 1] * wr + d[ti + 1] * wt + d[bi + 1] * wb) / wsum + n;
          d[i + 2] = (d[li + 2] * wl + d[ri + 2] * wr + d[ti + 2] * wt + d[bi + 2] * wb) / wsum + n;
        }
        d[i + 3] = 255;
      }
    }

    ctx.putImageData(patch, ex, ey);
  }

  const newUrl = off.toDataURL('image/png');
  S.modified[idx] = newUrl;

  // Se l'utente ha cambiato pagina durante gli await, non toccare il canvas
  if (S.page - 1 !== idx) return;

  const newImg = await loadImg(newUrl);
  const bg = fc.backgroundImage;
  if (bg && bg.setElement) {
    bg.setElement(newImg);
    bg.scaleX = S.zoom;
    bg.scaleY = S.zoom;
    fc.renderAll();
  }
}
function updateOrCreateTextObject(w) {
  const z = S.zoom;
  const txt = w.newText || w.text;
  const fs = (w.newFontSize || w.fontSize || 12) * z;
  const ff = w.newFont || w.font || 'Arial';
  const style = w.newStyle || w.style || 'normal';
  const color = w.newColor || '#000000';
  const box = w.newBbox || w.bbox_norm;
  
  let obj = fc.getObjects().find(o => o._wordId === w.id);
  
  if (obj) {
    obj.set({
      text: txt,
      left: box.x * z,
      top: box.y * z,
      fontSize: fs,
      fontFamily: ff,
      fontStyle: style.includes('italic') ? 'italic' : 'normal',
      fontWeight: style.includes('bold') ? 'bold' : 'normal',
      fill: color
    });
    obj.setCoords();
  } else {
    obj = new fabric.Text(txt, {
      left: box.x * z,
      top: box.y * z,
      fontSize: fs,
      fontFamily: ff,
      fontStyle: style.includes('italic') ? 'italic' : 'normal',
      fontWeight: style.includes('bold') ? 'bold' : 'normal',
      fill: color,
      selectable: true,
      hasControls: !isMobileDevice(),
      hasBorders: true,
      borderColor: '#8a9a7b',
      cornerColor: '#6f8265',
      cornerSize: 6,
      padding: 2
    });
    obj._wordId = w.id;
    
    obj.on('modified', () => {
      const w2 = S.words.find(x => x.id === obj._wordId);
      if (w2) {
        if (!w2.newBbox) w2.newBbox = { ...w2.bbox_norm };
        w2.newBbox.x = obj.left / z;
        w2.newBbox.y = obj.top / z;
        const br = obj.getBoundingRect();
        w2.newBbox.width = br.width / z;
        w2.newBbox.height = br.height / z;
        w2.newText = obj.text;
        w2.newFontSize = obj.fontSize / z;
        w2.newFont = obj.fontFamily;
        const newStyle = (obj.fontWeight === 'bold' ? 'bold' : 'normal') + (obj.fontStyle === 'italic' ? ' italic' : '');
        w2.newStyle = newStyle.trim();
        w2.newColor = obj.fill;
        saveUndo('Move/Resize');
        updateWordList();
        fc.renderAll();
      }
    });
    
    obj.on('mousedown', (e) => {
      e.e.stopPropagation();
      const w2 = S.words.find(x => x.id === obj._wordId);
      if (w2) openPopup(w2);
    });
    
    obj.on('touchstart', (e) => {
      e.e.stopPropagation();
      const w2 = S.words.find(x => x.id === obj._wordId);
      if (w2) openPopup(w2);
    });
    
    fc.add(obj);
  }
  return obj;
}
function renderAllTexts() {
  // Rimuovi tutti i textbox esistenti
  fc.getObjects().filter(obj => obj._wordId).forEach(obj => fc.remove(obj));
  // Ricrea solo quelli modificati e non cancellati
  const modifiedWords = S.words.filter(w => w.page === S.page && w.modified && !w.deleted);
  for (const w of modifiedWords) {
    updateOrCreateTextObject(w);
  }
  fc.renderAll();
}
function highlightSelected() {
  fc.getObjects().forEach(obj => {
    if (obj._hl) fc.remove(obj);
  });
  
  if (selectedWordsSet.size === 0) return;
  if (popup.style.display === 'none') return;
  
  for (const wordId of selectedWordsSet) {
    const w = S.words.find(w => w.id === wordId);
    if (!w || w.page !== S.page || w.deleted) continue;
    
    const b = w.newBbox || w.bbox_norm;
    const rect = new fabric.Rect({
      left: b.x * S.zoom,
      top: b.y * S.zoom,
      width: b.width * S.zoom,
      height: b.height * S.zoom,
      fill: 'rgba(138, 154, 123, 0.12)',
      stroke: '#8a9a7b',
      strokeWidth: 2,
      strokeDashArray: [4, 3],
      selectable: false,
      evented: false
    });
    rect._hl = true;
    fc.add(rect);
  }
  fc.renderAll();
}
async function loadPage(pg) {
  if (!S.loaded || pg < 1 || pg > S.total) return;
  S.page = pg;
  const url = S.modified[pg - 1] || S.images[pg - 1];
  const img = await loadImg(url);
  S.bw = img.width;
  S.bh = img.height;
  const w = img.width * S.zoom;
  const h = img.height * S.zoom;
  canvasEl.width = w;
  canvasEl.height = h;
  fc.setWidth(w);
  fc.setHeight(h);
  const bg = await new Promise(res => {
    fabric.Image.fromURL(url, o => {
      o.scaleX = S.zoom;
      o.scaleY = S.zoom;
      o.selectable = false;
      o.evented = false;
      res(o);
    }, { crossOrigin: 'anonymous' });
  });
  fc.setBackgroundImage(bg, () => {});
  renderAllTexts();
  highlightSelected();
  updateUI();
  document.getElementById('zoomLabel').textContent = Math.round(S.zoom * 100) + '%';
  fc.renderAll();
}

function zoomIn() { if (!S.loaded) return; S.zoom = Math.min(S.zoom * 1.2, 4); loadPage(S.page); }
function zoomOut() { if (!S.loaded) return; S.zoom = Math.max(S.zoom * 0.8, 0.25); loadPage(S.page); }

function findWordAt(nx, ny) {
  const pageWords = S.words.filter(w => w.page === S.page && !w.deleted && !w.modified);
  for (let i = pageWords.length - 1; i >= 0; i--) {
    const w = pageWords[i];
    const b = w.bbox_norm;
    if (nx >= b.x && nx <= b.x + b.width && ny >= b.y && ny <= b.y + b.height) return w;
  }
  return null;
}

canvasEl.addEventListener('click', (e) => {
  if (!S.loaded) return;
  
  const isMulti = e.metaKey || e.ctrlKey;
  
  const clickedObj = fc.findTarget(e);
  if (clickedObj && clickedObj._wordId) {
    const w = S.words.find(x => x.id === clickedObj._wordId);
    if (w) {
      if (isMulti) {
        // Cmd+Click: toggle selezione multipla
        if (selectedWordsSet.has(w.id)) {
          selectedWordsSet.delete(w.id);
        } else {
          selectedWordsSet.add(w.id);
        }
        S.selId = selectedWordsSet.size > 0 ? Array.from(selectedWordsSet)[0] : null;
        updateWordList();
        highlightSelected();
        if (selectedWordsSet.size > 0) {
          const firstW = S.words.find(x => x.id === Array.from(selectedWordsSet)[0]);
          if (firstW) openPopup(firstW);
        } else { closePopup(); }
        if (selectedWordsSet.size > 1) {
          toast(`${selectedWordsSet.size} words selected`, 'info');
        }
      } else {
        // Click normale: deseleziona tutto, seleziona solo questa, apri popup
        selectedWordsSet.clear();
        selectedWordsSet.add(w.id);
        S.selId = w.id;
        updateWordList();
        highlightSelected();
        openPopup(w);
      }
      return;
    }
  }
  
  // Click sul canvas (non su parola)
  const rect = canvasEl.getBoundingClientRect();
  const x = (e.clientX - rect.left) / S.zoom;
  const y = (e.clientY - rect.top) / S.zoom;
  const w = findWordAt(x, y);
  
  if (w) {
    if (isMulti) {
      if (selectedWordsSet.has(w.id)) {
        selectedWordsSet.delete(w.id);
      } else {
        selectedWordsSet.add(w.id);
      }
      S.selId = selectedWordsSet.size > 0 ? Array.from(selectedWordsSet)[0] : null;
      updateWordList();
      highlightSelected();
      closePopup();
      if (selectedWordsSet.size > 1) {
        toast(`${selectedWordsSet.size} words selected`, 'info');
      }
    } else {
      selectedWordsSet.clear();
      selectedWordsSet.add(w.id);
      S.selId = w.id;
      updateWordList();
      highlightSelected();
      openPopup(w);
    }
  } else {
    // Click su sfondo vuoto: deseleziona tutto
    selectedWordsSet.clear();
    S.selId = null;
    closePopup();
    updateWordList();
    highlightSelected();
  }
});
canvasEl.addEventListener('touchstart', (e) => {
  if (!S.loaded) return;
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvasEl.getBoundingClientRect();
  const x = (touch.clientX - rect.left) / S.zoom;
  const y = (touch.clientY - rect.top) / S.zoom;
  const w = findWordAt(x, y);
  if (w) {
    openPopup(w);
  } else {
    S.selId = null;
    closePopup();
  }
}, { passive: true });

function openPopup(w) {
  S.selId = w.id;
  document.getElementById('popupInput').value = w.newText || w.text;
  document.getElementById('popupFont').value = w.newFont || w.font || 'Arial';
  document.getElementById('popupFontSize').value = Math.round(w.newFontSize || w.fontSize || 12);
  document.getElementById('popupStyle').value = w.newStyle || w.style || 'normal';
  document.getElementById('popupColor').value = w.newColor || '#000000';
  popup.style.display = 'block';
  updateWordList();
  highlightSelected();
  scrollToWordIfNeeded(w);
  fc.renderAll();
}
function scrollToWordIfNeeded(w) {   // <-- DEFINIZIONE: fuori, funzione a sé
  if (!w || w.page !== S.page) return;
  const viewer = document.querySelector('.viewer');
  if (!viewer) return;
  const b = w.newBbox || w.bbox_norm;
  const cRect = canvasEl.getBoundingClientRect();
  const vRect = viewer.getBoundingClientRect();
  const wordTop    = cRect.top + b.y * S.zoom;
  const wordBottom = wordTop + b.height * S.zoom;
  if (wordTop < vRect.top || wordBottom > vRect.bottom) {
    const centerY = (b.y + b.height / 2) * S.zoom;
    const target = viewer.scrollTop + (cRect.top - vRect.top) + centerY - viewer.clientHeight / 2;
    viewer.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
  }
}
function _hidePopup() {
  popup.style.display = 'none';
  highlightSelected();
  updateUI();
}
function closePopup() {
  popup.style.display = 'none';
  S.selId = null;
  selectedWordsSet.clear();
  highlightSelected();
  updateWordList();
  updateUI();
}

async function applyEdit() {
  let wordsToEdit = [];
  
  // Se ci sono parole selezionate multipla
  if (selectedWordsSet.size > 0) {
    wordsToEdit = S.words.filter(w => selectedWordsSet.has(w.id));
  } 
  // Altrimenti la singola parola selezionata
  else if (S.selId) {
    const singleWord = S.words.find(w => w.id === S.selId);
    if (singleWord) wordsToEdit = [singleWord];
  }
  
  if (wordsToEdit.length === 0) return;
  
  const newText = document.getElementById('popupInput').value.trim();
  if (!newText) return;
  
  saveUndo('Edit');
  
  const newFont = document.getElementById('popupFont').value;
  const newSize = parseInt(document.getElementById('popupFontSize').value);
  const newStyle = document.getElementById('popupStyle').value;
  const newColor = document.getElementById('popupColor').value;
  
  loading(true);
  
  try {
    for (const w of wordsToEdit) {
      await inpaintClean([w]);
      w.modified = true;
      w.newText = newText;
      w.newFont = newFont;
      w.newFontSize = newSize;
      w.newStyle = newStyle;
      w.newColor = newColor;
      if (!w.newBbox) w.newBbox = { ...w.bbox_norm };
      w.newBbox.width = Math.max(w.newBbox.width, newText.length * newSize * 0.55);
    }
    
    const savedIds = new Set(wordsToEdit.map(w => w.id));
    const savedSelId = wordsToEdit[0]?.id || null;
    closePopup();
    await loadPage(S.page);
    // Ripristina selezione dopo loadPage
    savedIds.forEach(id => selectedWordsSet.add(id));
    S.selId = savedSelId;
    updateWordList();
    highlightSelected();
    toast(`✓ Applied to ${wordsToEdit.length} word(s)`, 'success');
  } catch (err) {
    toast('Error: ' + err.message, 'error');
  } finally {
    loading(false);
  }
}

async function duplicateWord() {
  if (!S.selId) return;
  const orig = S.words.find(w => w.id === S.selId);
  if (!orig) return;
  saveUndo('Duplicate');
  const fs = orig.newFontSize || orig.fontSize || 12;
  const nt = (orig.newText || orig.text) + ' (copy)';
  const sb = orig.newBbox || orig.bbox_norm;
  const newWord = {
    id: 'dup_' + Date.now() + '_' + Math.random(),
    page: S.page,
    text: orig.text,
    bbox_norm: { x: sb.x + 15, y: sb.y + 15, width: sb.width, height: sb.height },
    confidence: 100,
    font: orig.newFont || orig.font || 'Arial',
    fontSize: fs,
    style: orig.newStyle || orig.style || 'normal',
    color: orig.newColor || '#000000',
    modified: true,
    deleted: false,
    newText: nt,
    newFont: orig.newFont || orig.font,
    newFontSize: fs,
    newStyle: orig.newStyle || orig.style,
    newColor: orig.newColor || '#000000',
    newBbox: { x: sb.x + 15, y: sb.y + 15, width: Math.max(sb.width, nt.length * fs * 0.55), height: sb.height }
  };
  S.words.push(newWord);
  S.selId = newWord.id;
  await loadPage(S.page);
  openPopup(newWord);
  toast('📋 Duplicated', 'info');
}

async function deleteWord() {
  let wordsToDelete = [];
  
  // Se ci sono parole selezionate multipla
  if (selectedWordsSet.size > 0) {
    wordsToDelete = S.words.filter(w => selectedWordsSet.has(w.id));
  } 
  // Altrimenti la singola parola selezionata
  else if (S.selId) {
    const singleWord = S.words.find(w => w.id === S.selId);
    if (singleWord) wordsToDelete = [singleWord];
  }
  
  if (wordsToDelete.length === 0) return;
  
  const confirmMsg = wordsToDelete.length === 1 
    ? 'Delete this word?' 
    : `Delete ${wordsToDelete.length} words?`;
  
  if (!confirm(confirmMsg)) return;
  
  saveUndo('Delete');
  loading(true);
  
  try {
    for (const w of wordsToDelete) {
      await inpaintClean([w]);
      w.deleted = true;
      w.modified = true;
    }
    
    selectedWordsSet.clear();
    S.selId = null;
    closePopup();
    await loadPage(S.page);
    toast(`🗑 Deleted ${wordsToDelete.length} word(s)`, 'success');
  } catch (err) {
    toast('Error: ' + err.message, 'error');
  } finally {
    loading(false);
  }
}

// ==================== FIX MOBILE OCR OTTIMIZZATO ====================
async function compressImageForOCR(dataUrl, maxSize = 1200) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let width = img.width;
      let height = img.height;
      if (width > maxSize || height > maxSize) {
        if (width > height) {
          height = (height * maxSize) / width;
          width = maxSize;
        } else {
          width = (width * maxSize) / height;
          height = maxSize;
        }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      // FIX: report the scale actually applied so callers can rescale
      // Tesseract's returned bounding boxes back to the original image.
      resolve({ url: canvas.toDataURL('image/jpeg', 0.7), scale: width / img.width });
    };
    img.src = dataUrl;
  });
}

async function preprocessForOCR(dataUrl) {
  const img = await loadImg(dataUrl);
  const minSide = Math.min(img.width, img.height);
  const scale = minSide < 900 ? 1.6 : 1; // upscale small/low-res pages for clearer glyphs
  const c = document.createElement('canvas');
  c.width = Math.round(img.width * scale);
  c.height = Math.round(img.height * scale);
  const ctx = c.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(img, 0, 0, c.width, c.height);
  const id = ctx.getImageData(0, 0, c.width, c.height);
  const d = id.data;
  // grayscale + track mean luminance to detect dark-background documents
  let sum = 0, min = 255, max = 0;
  const n = d.length / 4;
  for (let i = 0; i < d.length; i += 4) {
    const g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
    d[i] = d[i + 1] = d[i + 2] = g;
    sum += g;
    if (g < min) min = g;
    if (g > max) max = g;
  }
  const mean = sum / n;
  // FIX: Tesseract expects dark text on a light background. If the page is
  // predominantly dark (light text on dark background), invert it first —
  // otherwise recognition is unreliable regardless of contrast/upscale.
  const inverted = mean < 128;
  if (inverted) {
    for (let i = 0; i < d.length; i += 4) {
      const v = 255 - d[i];
      d[i] = d[i + 1] = d[i + 2] = v;
    }
    // recompute min/max cleanly post-inversion for an accurate stretch
    min = 255; max = 0;
    for (let i = 0; i < d.length; i += 4) {
      if (d[i] < min) min = d[i];
      if (d[i] > max) max = d[i];
    }
  }
  const range = Math.max(1, max - min);
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.min(255, Math.max(0, ((d[i] - min) / range) * 255));
    d[i] = d[i + 1] = d[i + 2] = v;
  }
  ctx.putImageData(id, 0, 0);
  // FIX: return the scale factor too — callers must divide returned OCR
  // bounding boxes by this before storing them, since Tesseract reports
  // coordinates in THIS (possibly upscaled) image's pixel space, not the
  // original page's. Forgetting this shifts and resizes every word box.
  return { url: c.toDataURL('image/png'), scale };
}

async function runOCR() {
  if (!S.loaded) {
    toast('Load a document first', 'error');
    return;
  }

  // FIX: impedisci esecuzioni multiple contemporanee (anti-loop)
  if (S._ocrRunning) {
    toast('OCR already running...', 'info');
    return;
  }
  S._ocrRunning = true;

  loading(true);
  let worker = null;
  try {
    const currentPageIndex = S.page - 1;
    const originalUrl = S.images[currentPageIndex];
    if (!originalUrl) {
      toast('No image found for current page', 'error');
      S._ocrRunning = false;
      loading(false);
      return;
    }

    const vbase = location.href.substring(0, location.href.lastIndexOf('/') + 1);
    // Try OEM 2 (Legacy + LSTM) first; fall back to OEM 1 (LSTM only, known-good)
    // if the installed .traineddata doesn't support the Legacy engine.
    try {
      worker = await Tesseract.createWorker('ita', 2, {
        workerPath: vbase + 'vendor/tesseract/worker.min.js',
        corePath:   vbase + 'vendor/tesseract/core',
        langPath:   vbase + 'vendor/tesseract/lang'
      });
      toast('OCR: usando OEM 2 (Legacy + LSTM)', 'info');
    } catch (oemErr) {
      console.warn('OEM 2 unavailable, falling back to OEM 1 (LSTM only):', oemErr);
      worker = await Tesseract.createWorker('ita', 1, {
        workerPath: vbase + 'vendor/tesseract/worker.min.js',
        corePath:   vbase + 'vendor/tesseract/core',
        langPath:   vbase + 'vendor/tesseract/lang'
      });
      toast('OCR: usando OEM 1 (LSTM puro)', 'info');
    }

    const isMobile = isMobileDevice();
    let imageUrl = originalUrl;
    let ocrScale = 1; // combined scale of whatever we fed to Tesseract vs. the original page
    if (isMobile) {
      const compressed = await compressImageForOCR(originalUrl, 1000);
      imageUrl = compressed.url;
      ocrScale *= compressed.scale;
      toast('Mobile mode: optimizing image...', 'info');
    }
    // FIX: preprocess for OCR (grayscale + contrast stretch + modest upscale on small images)
    // — improves recognition on faint scans, small text, and low-contrast documents.
    try {
      const prepped = await preprocessForOCR(imageUrl);
      imageUrl = prepped.url;
      ocrScale *= prepped.scale;
    } catch (prepErr) { console.warn('OCR preprocessing skipped:', prepErr); }

    // PSM 6 = treat the page as a single uniform block of text.
    // Correct API is setParameters() before recognize() — passing it inside
    // recognize()'s options object (as sometimes seen in snippets) is silently ignored.
    try { await worker.setParameters({ tessedit_pageseg_mode: '6' }); } catch (psmErr) { console.warn('PSM setting skipped:', psmErr); }

    const { data } = await worker.recognize(imageUrl);
    await worker.terminate();
    worker = null;

    // FIX: Tesseract's bbox coordinates are in the pixel space of imageUrl
    // (possibly compressed and/or upscaled above) — divide by ocrScale to
    // convert them back to the ORIGINAL page's pixel space, which is what
    // bbox_norm must be in for the word outlines to land on the real text.
    const newWords = (data.words || [])
      .filter(w => w.text && w.text.trim().length > 0 && w.confidence > 30 && /[\p{L}\p{N}]/u.test(w.text))
      .map((w, i) => ({
        id: 'w_' + Date.now() + '_' + i + '_' + Math.random().toString(36).substr(2, 6),
        page: S.page,
        text: w.text.trim(),
        bbox_norm: {
          x: w.bbox.x0 / ocrScale,
          y: w.bbox.y0 / ocrScale,
          width: (w.bbox.x1 - w.bbox.x0) / ocrScale,
          height: (w.bbox.y1 - w.bbox.y0) / ocrScale
        },
        confidence: Math.round(w.confidence),
        font: 'Arial',
        fontSize: Math.max(6, Math.round(((w.bbox.y1 - w.bbox.y0) / ocrScale) * 1.35)),
        style: 'normal',
        color: '#000000',
        modified: false,
        deleted: false
      }));

    const wordsFromOtherPages = S.words.filter(w => w.page !== S.page || w.modified);
    S.words = wordsFromOtherPages.concat(newWords);

    saveUndo('OCR');
    // FIX: niente loadPage dopo l'OCR (era la causa del loop) — solo refresh leggero
    updateWordList();
    renderAllTexts();
    document.getElementById('wordCount').textContent = S.words.filter(w => w.page === S.page && !w.deleted).length;

    toast(`OCR: ${newWords.length} words recognized on page ${S.page}`, 'success');

  } catch (err) {
    console.error('OCR error:', err);
    toast('OCR error: ' + err.message, 'error');
  } finally {
    if (worker) {
      try { await worker.terminate(); } catch(e) {}
    }
    S._ocrRunning = false;
    loading(false);
  }
}
function changePage(delta) {
  const np = S.page + delta;
  if (np >= 1 && np <= S.total) loadPage(np);
}

async function exportAsImage() {
  if (!S.loaded) return;
  loading(true);
  try {
    const dataUrl = fc.toDataURL({ format: 'png', multiplier: 2 });
    if (window.__TAURI__) {
      const blob = await (await fetch(dataUrl)).blob();
      const ok = await saveBlobNative(blob, `ScanEdit_page${S.page}.png`, 'png');
      if (ok) toast('✓ Image exported', 'success');
      return;
    }
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `ScanEdit_page${S.page}.png`;
    a.click();
    toast('✓ Image exported', 'success');
  } catch (err) {
    toast('Export error: ' + err.message, 'error');
  } finally {
    loading(false);
  }
}

async function exportAsPDF() {
  if (!S.loaded) return;
  loading(true);
  try {
    const { jsPDF } = window.jspdf;
    const dataUrl = fc.toDataURL({ format: 'png', multiplier: 2 });
    if (window.__TAURI__) {
      const blob = await (await fetch(dataUrl)).blob();
      const ok = await saveBlobNative(blob, `ScanEdit_page${S.page}.png`, 'png');
      if (ok) toast('✓ Image exported', 'success');
      return;
    }
    const img = await loadImg(dataUrl);
    const pdf = new jsPDF({
      orientation: img.width > img.height ? 'landscape' : 'portrait',
      unit: 'px',
      format: [img.width, img.height]
    });
    pdf.addImage(dataUrl, 'PNG', 0, 0, img.width, img.height);
    savePdf(pdf, `ScanEdit_page${S.page}.pdf`);
    toast('✓ PDF exported', 'success');
  } catch (err) {
    toast('PDF error: ' + err.message, 'error');
  } finally {
    loading(false);
  }
}

async function exportAllAsPDF() {
  if (!S.loaded || S.total === 0) {
    toast('No document loaded', 'error');
    return;
  }
  loading(true);
  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    let isFirstPage = true;
    
    for (let i = 1; i <= S.total; i++) {
      const url = S.modified[i - 1] || S.images[i - 1];
      const img = await loadImg(url);
      
      if (!isFirstPage) {
        pdf.addPage();
      }
      
      const imgWidth = pdf.internal.pageSize.getWidth();
      const imgHeight = (img.height * imgWidth) / img.width;
      pdf.addImage(url, 'PNG', 0, 0, imgWidth, imgHeight);
      isFirstPage = false;
    }
    
    savePdf(pdf, 'ScanEdit_complete.pdf');
    toast('✓ Complete PDF exported', 'success');
  } catch (err) {
    toast('Export error: ' + err.message, 'error');
  } finally {
    loading(false);
  }
}

// ==================== UNDO/REDO ====================
function saveUndo(action) {
  S.undoStack.push({
    words: JSON.parse(JSON.stringify(S.words)),
    modified: [...S.modified],
    selId: S.selId,
    page: S.page,
    zoom: S.zoom
  });
  S.redoStack = [];
  updateUI();
}

function undo() {
  if (!S.undoStack.length) return;
  S.redoStack.push({
    words: JSON.parse(JSON.stringify(S.words)),
    modified: [...S.modified],
    selId: S.selId,
    page: S.page,
    zoom: S.zoom
  });
  const st = S.undoStack.pop();
  S.words = st.words;
  S.modified = st.modified;
  S.selId = st.selId;
  S.zoom = st.zoom;
  closePopup();
  loadPage(st.page);
  toast('↩ Undo', 'info');
}

function redo() {
  if (!S.redoStack.length) return;
  S.undoStack.push({
    words: JSON.parse(JSON.stringify(S.words)),
    modified: [...S.modified],
    selId: S.selId,
    page: S.page,
    zoom: S.zoom
  });
  const st = S.redoStack.pop();
  S.words = st.words;
  S.modified = st.modified;
  S.selId = st.selId;
  S.zoom = st.zoom;
  closePopup();
  loadPage(st.page);
  toast('↪ Redo', 'info');
}

function updateUI() {
  const pageInfoSpan = document.getElementById('pageInfo');
  if (pageInfoSpan) {
    pageInfoSpan.textContent = S.total ? `${S.page} / ${S.total}` : '— / —';
  }
  document.getElementById('prevBtn').disabled = S.page <= 1;
  document.getElementById('nextBtn').disabled = S.page >= S.total;
  document.getElementById('undoBtn').disabled = S.undoStack.length === 0;
  document.getElementById('redoBtn').disabled = S.redoStack.length === 0;
  document.getElementById('ocrBtn').disabled = !S.loaded;
  document.getElementById('exportBtn').disabled = !S.loaded;
  updateWordList();
}

function filterWords() {
  S.filter = document.getElementById('searchInput').value.toLowerCase();
  updateWordList();
}

function updateWordList() {
  const container = document.getElementById('wordList');
  const pageWords = S.words.filter(w => w.page === S.page);
  const filtered = S.filter ? pageWords.filter(w => (w.newText || w.text).toLowerCase().includes(S.filter)) : pageWords;
  if (!filtered.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;opacity:0.5">' + (pageWords.length ? 'No results' : 'Run OCR to recognize text') + '</div>';
    return;
  }
  
  container.innerHTML = filtered.map(w => {
    const txt = (w.newText || w.text).substring(0, 30);
    const isSel = selectedWordsSet.has(w.id);
    let cls = 'word-item';
    if (isSel) cls += ' selected';
    if (w.modified && !w.deleted) cls += ' modified';
    if (w.deleted) cls += ' deleted';
    let badge = '';
    if (w.modified && !w.deleted) badge = '<span class="word-item-badge badge-mod">mod</span>';
    return `<div class="${cls}" data-id="${w.id}">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${escapeHtml(txt)}</span>
      ${badge}
      <span style="font-size:0.7rem;opacity:0.5">${w.confidence}%</span>
    </div>`;
  }).join('');
  
  container.querySelectorAll('.word-item').forEach(el => {
    el.addEventListener('click', (e) => {
      const id = el.dataset.id;
      const w = S.words.find(w => w.id === id);
      if (!w) return;
      if (e.ctrlKey || e.metaKey || e.shiftKey) {
        if (selectedWordsSet.has(id)) {
          selectedWordsSet.delete(id);
          if (selectedWordsSet.size === 0) { S.selId = null; closePopup(); }
          else { S.selId = Array.from(selectedWordsSet)[0]; const fw = S.words.find(x => x.id === S.selId); if (fw) openPopup(fw); }
        } else {
          selectedWordsSet.add(id);
          S.selId = id;
          const fw = S.words.find(x => x.id === id);
          if (fw) openPopup(fw);
          if (selectedWordsSet.size > 1) toast(selectedWordsSet.size + ' words selected', 'info');
        }
      } else {
        selectedWordsSet.clear();
        selectedWordsSet.add(id);
        S.selId = id;
        openPopup(w);
      }
    });
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const id = el.dataset.id;
      const w = S.words.find(w => w.id === id);
      if (w) { selectedWordsSet.clear(); selectedWordsSet.add(id); S.selId = id; openPopup(w); }
    }, { passive: false });
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
// ==================== CARICAMENTO DOCUMENTI ====================
document.getElementById('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  if (!isProActive() && getFreeLoads() >= FREE_LOAD_LIMIT) {
    toast('Free limit reached (3 documents) — activate Licenza PRO for unlimited', 'error');
    this.value = '';
    return;
  }
  
  loading(true);
  try {
    S.images = [];
    S.modified = [];
    S.words = [];
    S.selId = null;
    S.page = 1;
    S.zoom = 1;
    S.undoStack = [];
    S.redoStack = [];
    S.loaded = false;
    closePopup();
    
    const fileType = file.type;
    const fileName = file.name.toLowerCase();

    overlay.addEventListener('mousedown', function (e) {

    var _rat = renderAllTexts;

    /* ---- phrase-aware rewrite (inpaint all, write once) ---- */
    applyEdit = async function () {
      var wordsToEdit = [];
      if (selectedWordsSet.size > 0) wordsToEdit = S.words.filter(function (w) { return selectedWordsSet.has(w.id); });

      if (!wordsToEdit.length) return;
      var newText = document.getElementById('popupInput').value.trim();
      if (!newText) return;
      var nf = document.getElementById('popupFont').value, nz = parseInt(document.getElementById('popupFontSize').value), nst = document.getElementById('popupStyle').value, nc = document.getElementById('popupColor').value;
      saveUndo('Edit'); loading(true);
      try {
        ensureGroups();
        var ordered = wordsToEdit.slice().sort(function (a, b) { return (a._order || 0) - (b._order || 0); });
        await inpaintClean(ordered);
        var obox = overallBox(new Set(ordered.map(function (w) { return w.id; })));
        var ux = obox.x, uy = obox.y, uw = obox.width, uh = obox.height;
        var c = ordered[0];
        c.modified = true; c.deleted = false; c.newText = newText; c.newFont = nf; c.newFontSize = nz; c.newStyle = nst; c.newColor = nc;
        c.newBbox = {
          x: ux + dragOffset.dx, y: uy + dragOffset.dy,
          width: handleSize.w != null ? handleSize.w : uw,
          height: handleSize.h != null ? handleSize.h : uh

    };

      var z = S.zoom, box = w.newBbox || w.bbox_norm, st = w.newStyle || w.style || 'normal', TB = fabric.Textbox || fabric.Text;
      var obj = new TB(w.newText || w.text, { left: box.x * z, top: box.y * z, width: Math.max(40, box.width * z), fontSize: (w.newFontSize || w.fontSize || 12) * z, fontFamily: w.newFont || w.font || 'Arial', fontStyle: st.indexOf('italic') >= 0 ? 'italic' : 'normal', fontWeight: st.indexOf('bold') >= 0 ? 'bold' : 'normal', fill: w.newColor || '#000000', selectable: true, hasControls: !isMobileDevice(), hasBorders: true, borderColor: '#8a9a7b', cornerColor: '#6f8265', cornerSize: 6, padding: 2 });

<!-- ===== live preview while editing (added; nothing else modified) ===== -->
<script>
/* ScanEdit — live preview while editing (before Apply).
   Isolated add-on: touches nothing else. Draws a temporary overlay
   (background patch + new text) above the current selection, updated
   on every keystroke / control change. Removed on Apply/Cancel/close.
   Wrapped in try/catch so a failure here can never affect the editor. */
(function () {
  try {
    if (typeof fabric === 'undefined' || typeof S === 'undefined' || typeof fc === 'undefined') return;

    function safe(fn) { try { return fn(); } catch (e) { console.warn('[live-preview]', e); } }

    function currentSelectionWords() {
      if (typeof selectedWordsSet !== 'undefined' && selectedWordsSet.size > 0) {
        return S.words.filter(function (w) { return selectedWordsSet.has(w.id); });
      }
      if (S.selId) {
        var w = S.words.find(function (x) { return x.id === S.selId; });
        return w ? [w] : [];
      }
      return [];
    }

    function unionBox(words) {
      var boxes = words.map(function (w) { return w.newBbox || w.bbox_norm; });
      var x = Math.min.apply(null, boxes.map(function (b) { return b.x; }));
      var y = Math.min.apply(null, boxes.map(function (b) { return b.y; }));
      var x2 = Math.max.apply(null, boxes.map(function (b) { return b.x + b.width; }));
      var y2 = Math.max.apply(null, boxes.map(function (b) { return b.y + b.height; }));
      return { x: x, y: y, width: x2 - x, height: y2 - y };
    }

    function clearPreview() {
      fc.getObjects().slice().forEach(function (o) { if (o._livePreview) fc.remove(o); });
      fc.renderAll();
    }

    function drawPreview() {
      clearPreview();
      var words = currentSelectionWords();
      if (!words.length) return;
      var txt = document.getElementById('popupInput').value;
      if (!txt) { return; } // nothing typed yet: show original, no overlay

      var box = (typeof window.__seGetHandleBox === 'function' && window.__seGetHandleBox()) || unionBox(words);
      var z = S.zoom;
      var fontEl = document.getElementById('popupFont');
      var sizeEl = document.getElementById('popupFontSize');
      var styleEl = document.getElementById('popupStyle');
      var colorEl = document.getElementById('popupColor');
      var ff = fontEl ? fontEl.value : 'Arial';
      var fsRaw = sizeEl ? parseInt(sizeEl.value) : 12;
      var fs = (isNaN(fsRaw) ? 12 : fsRaw) * z;
      var st = styleEl ? styleEl.value : 'normal';
      var color = colorEl ? colorEl.value : '#000000';

      // Auto-grow the placeholder to fit what's typed — but only for word/line
      // selections (naturally single-line). Sentence/paragraph selections span
      // multiple lines on purpose; auto-fitting them to one line would fight
      // the wrapping instead of respecting it. Manual resize always wins.
      var singleLineGran = !S.gran || S.gran === 'word' || S.gran === 'line';
      if (singleLineGran && typeof window.__seAutoFitHandleWidth === 'function') {
        try {
          var mc = document.createElement('canvas').getContext('2d');
          var weight = st.indexOf('bold') >= 0 ? 'bold ' : '';
          var italic = st.indexOf('italic') >= 0 ? 'italic ' : '';
          mc.font = italic + weight + Math.round(fs) + 'px ' + ff;
          var neededPx = mc.measureText(txt).width + 16; // small horizontal padding
          window.__seAutoFitHandleWidth(neededPx / z);
          var refreshed = window.__seGetHandleBox();
          if (refreshed) box = refreshed;
        } catch (e) { /* keep the box as computed above */ }
      }

      // Backing patch so the preview text is legible over the original pixels.
      // Approximate background by sampling a pixel just above the box.
      var bg = '#ffffff';
      try {
        var bgImg = fc.backgroundImage;
        if (bgImg && bgImg._element) {
          var oc = document.createElement('canvas');
          oc.width = 1; oc.height = 1;
          var octx = oc.getContext('2d');
          octx.drawImage(bgImg._element, Math.max(0, box.x - 2), Math.max(0, box.y - 2), 1, 1, 0, 0, 1, 1);
          var px = octx.getImageData(0, 0, 1, 1).data;
          bg = 'rgb(' + px[0] + ',' + px[1] + ',' + px[2] + ')';
        }
      } catch (e) { /* fall back to white */ }

      var patch = new fabric.Rect({
        left: box.x * z, top: box.y * z, width: box.width * z, height: box.height * z,
        fill: bg, stroke: 'rgba(111,130,101,0.5)', strokeWidth: 1, strokeDashArray: [3, 2],
        selectable: false, evented: false
      });
      patch._livePreview = true;

      var TB = fabric.Textbox || fabric.Text;
      var preview = new TB(txt, {
        left: box.x * z, top: box.y * z, width: Math.max(40, box.width * z),
        fontSize: fs, fontFamily: ff,
        fontStyle: st.indexOf('italic') >= 0 ? 'italic' : 'normal',
        fontWeight: st.indexOf('bold') >= 0 ? 'bold' : 'normal',
        fill: color, opacity: 0.92,
        selectable: false, evented: false

      fc.add(patch);

    var applyBtn = document.querySelector('.popup-body .btn-success');
    if (applyBtn) applyBtn.addEventListener('click', function () { safe(clearPreview); });
    var closeBtn = document.querySelector('.popup-close');

    }

    console.log('[live-preview] ready');
  } catch (e) { console.warn('[live-preview] disabled:', e); }
})();

</script>
